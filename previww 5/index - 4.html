<!DOCTYPE html>
<html lang="es">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HNPCPSBL3E"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-HNPCPSBL3E');
</script>

<meta charset="UTF-8">
<title>Resultado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background: #f5f5f5; text-align: center; margin: 0; }
.container { max-width: 400px; margin: auto; background: #fff; padding: 20px; }
.saldo { font-size: 28px; color: green; margin: 20px 0; font-weight: bold; }
.btn { background:#28a745; color:#fff; padding:15px; margin-top:20px; border-radius:6px; cursor:pointer; }
.timer { color:red; font-weight:bold; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h2>💰 ¡Sistema de retiro liberado!</h2>

<div id="saldo" class="saldo"></div>

<p><b>⚠️ Tu saldo está reservado por tiempo limitado!</b></p>

<div id="timer" class="timer"></div>

<div id="atividade"></div>

<div class="btn" onclick="sacar()">RETIRAR AHORA</div>

</div>

<script>

// 🔥 EVENTO: usuario llegó al resultado
gtag('event', 'ver_resultado', {
  event_category: 'funil',
  event_label: 'pagina_final'
});

// ===== SALDO =====
let saldo = Number(localStorage.getItem("saldo")) || 0;
document.getElementById("saldo").innerHTML = "Saldo: $" + saldo;

// ===== TIMER CORREGIDO =====
let tempoFinal = Number(localStorage.getItem("tempoFinal"));

if(!tempoFinal){
  tempoFinal = Date.now() + (5 * 60 * 1000);
  localStorage.setItem("tempoFinal", tempoFinal);
}

function actualizar(){
  let diff = Math.floor((tempoFinal - Date.now()) / 1000);

  if(diff <= 0){
    document.getElementById("timer").innerHTML = "⛔ Tiempo agotado";
    return;
  }

  let m = Math.floor(diff/60);
  let s = diff%60;
  if(s < 10) s = "0"+s;

  document.getElementById("timer").innerHTML =
    "Tiempo restante: " + m + ":" + s;

  setTimeout(actualizar,1000);
}

actualizar();

// ===== ACTIVIDAD =====
const msgs = [
"🔥 Alguien acaba de completar el proceso",
"🔥 Usuario avanzó al retiro ahora",
"🔥 Nueva actividad registrada",
"🔥 Otro usuario finalizó",
"🔥 Más un acceso reciente"
];

function actividad(){
  document.getElementById("atividade").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];
}

actividad();
setInterval(actividad,4000);

// ===== BOTÓN (CONVERSIÓN) =====
function sacar(){

  // 🎯 EVENTO DE CONVERSIÓN
  gtag('event', 'clic_retirar', {
    event_category: 'conversion',
    event_label: 'boton_retirar',
    value: saldo
  });

 

  window.location.href = "https://pay.hotmart.com/Q103607975L?off=sy9cu7sb&checkoutMode=10";
}

</script>

</body>
</html>
